<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FridgeAI</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
}

.pageBg{
min-height:100vh;
background-size:cover;
background-position:center;
padding:20px;
}

.scanBg{background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");}
.recipeBg{background-image:url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c");}
.planBg{background-image:url("https://images.unsplash.com/photo-1556910103-1c02745aae4d");}
.shopBg{background-image:url("https://images.unsplash.com/photo-1506617420156-8e4536971650");}

.overlay{
background:rgba(0,0,0,0.75);
padding:20px;
min-height:100vh;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111827;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#374151;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.content{
margin-left:220px;
}

.page{display:none}
.active{display:block}

.card{
background:#1f2937;
padding:10px;
margin:5px;
border-radius:6px;
display:inline-block;
}

.recipe{
background:#22c55e;
padding:8px;
margin:5px;
border-radius:6px;
cursor:grab;
}

.day{
background:#1f2937;
width:140px;
min-height:120px;
margin:5px;
padding:10px;
border-radius:10px;
}

.plan{
display:flex;
flex-wrap:wrap;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>FridgeAI</h2>

<button onclick="showPage('scan')">📷 Analyse</button>
<button onclick="showPage('recipes')">🍳 Rezepte</button>
<button onclick="showPage('plan')">📅 Wochenplan</button>
<button onclick="showPage('shop')">🛒 Einkaufsliste</button>

</div>

<div class="content">

<div id="scan" class="page active pageBg scanBg">
<div class="overlay">

<h1>Kühlschrank Analyse</h1>

<button onclick="simulateScan()">Kühlschrank analysieren</button>

<h3>Zutaten</h3>
<div id="ingredientList"></div>

<input id="newIngredient" placeholder="Lebensmittel hinzufügen">
<button onclick="addIngredient()">Hinzufügen</button>

</div>
</div>

<div id="recipes" class="page pageBg recipeBg">
<div class="overlay">

<h1>Rezepte</h1>

<div id="premiumMessage"></div>

<button onclick="activatePremium()">Premium aktivieren</button>

<div id="recipeList"></div>

</div>
</div>

<div id="plan" class="page pageBg planBg">
<div class="overlay">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Montag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Dienstag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Mittwoch</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Donnerstag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Freitag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Samstag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Sonntag</div>

</div>

</div>
</div>

<div id="shop" class="page pageBg shopBg">
<div class="overlay">

<h1>Einkaufsliste</h1>

<input id="shopInput" placeholder="Produkt hinzufügen">
<button onclick="addShopping()">Hinzufügen</button>

<div id="shoppingList"></div>

</div>
</div>

</div>

<script>

let ingredients=[]
let shopping=[]
let premium=false

let recipes=[
{name:"Omelett",needs:["Ei","Käse"]},
{name:"Tomaten Pasta",needs:["Tomate","Spaghetti"]},
{name:"Sandwich",needs:["Brot","Käse"]},
{name:"Salat",needs:["Salat","Tomate"]}
]

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function simulateScan(){

const scans=[
["Ei","Käse","Tomate"],
["Brot","Käse"],
["Salat","Tomate"],
["Ei","Tomate"]
]

ingredients=scans[Math.floor(Math.random()*scans.length)]

renderIngredients()
generateRecipes()

}

function addIngredient(){

ingredients.push(newIngredient.value)

renderIngredients()
generateRecipes()

}

function renderIngredients(){

ingredientList.innerHTML=""

ingredients.forEach(i=>{
let el=document.createElement("div")
el.className="card"
el.innerText=i
ingredientList.appendChild(el)
})

}

function activatePremium(){

premium=true
generateRecipes()

}

function generateRecipes(){

recipeList.innerHTML=""

if(!premium){

premiumMessage.innerHTML="🔒 Rezepte nur mit Premium Abo"
return

}

premiumMessage.innerHTML=""

recipes.forEach(r=>{

let el=document.createElement("div")
el.className="recipe"
el.innerText=r.name
el.draggable=true

el.ondragstart=(e)=>{
e.dataTransfer.setData("recipe",JSON.stringify(r))
}

recipeList.appendChild(el)

})

}

function allowDrop(e){
e.preventDefault()
}

function drop(e){

e.preventDefault()

let recipe=JSON.parse(e.dataTransfer.getData("recipe"))

let el=document.createElement("div")
el.innerText=recipe.name

e.target.appendChild(el)

recipe.needs.forEach(n=>{

if(!ingredients.includes(n) && !shopping.includes(n)){
shopping.push(n)
}

})

renderShopping()

}

function addShopping(){

shopping.push(shopInput.value)
renderShopping()

}

function renderShopping(){

shoppingList.innerHTML=""

shopping.forEach((i,index)=>{

let el=document.createElement("div")
el.className="card"

el.innerHTML=i+" <button onclick='removeItem("+index+")'>X</button>"

shoppingList.appendChild(el)

})

}

function removeItem(i){

shopping.splice(i,1)
renderShopping()

}

</script>

</body>
</html>
