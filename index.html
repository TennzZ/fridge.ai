<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FridgeAI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");
background-size:cover;
color:white;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginCard{

background:#1f2937;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;

}

input{

width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;

}

button{

padding:10px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;

}

.app{

display:none;

}

.appLayout{

display:flex;
min-height:100vh;

}

.sidebar{

width:220px;
background:#111827;
padding:20px;

}

.sidebar button{

display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
background:#374151;
color:white;
border-radius:8px;
cursor:pointer;

}

.content{

flex:1;
padding:20px;

}

.page{

display:none;

}

.active{

display:block;

}

.card{

background:#1f2937;
padding:12px;
margin:6px;
border-radius:8px;
display:inline-block;

}

.food{

background:#22c55e;
padding:6px;
margin:5px;
border-radius:6px;
cursor:grab;

}

.plan{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.day{

background:#1f2937;
padding:10px;
width:150px;
min-height:120px;
border-radius:10px;

}

.shopItem{

background:#1f2937;
padding:8px;
margin:5px;
border-radius:6px;

}

img.foodimg{

width:100px;
border-radius:10px;
margin:5px;

}

video{

width:320px;
border-radius:10px;

}

</style>

</head>

<body>

<div class="overlay">

<div id="loginScreen" class="center">

<div class="loginCard">

<h2>FridgeAI Login</h2>

<input id="email" placeholder="Email">

<input id="pass" type="password" placeholder="Passwort">

<button onclick="register()">Registrieren</button>

<button onclick="login()">Login</button>

</div>

</div>

<div id="app" class="app">

<div class="appLayout">

<div class="sidebar">

<h3>FridgeAI</h3>

<button onclick="showPage('dashboard')">🏠 Dashboard</button>

<button onclick="showPage('scan')">📷 Kühlschrank Scan</button>

<button onclick="showPage('recipes')">🍳 Rezepte</button>

<button onclick="showPage('plan')">📅 Wochenplan</button>

<button onclick="showPage('shop')">🛒 Einkauf</button>

<button onclick="logout()">Logout</button>

</div>

<div class="content">

<div id="dashboard" class="page active">

<h1>Willkommen bei FridgeAI</h1>

<img src="https://images.unsplash.com/photo-1490818387583-1baba5e638af" width="300">

<p>Scanne deinen Kühlschrank und finde Rezepte.</p>

</div>

<div id="scan" class="page">

<h1>Kühlschrank Scan</h1>

<button onclick="startCamera()">Kamera starten</button>

<video id="video" autoplay></video>

<canvas id="canvas" style="display:none"></canvas>

<h3>Zutaten</h3>

<div id="foods"></div>

<input id="newFood" placeholder="Lebensmittel hinzufügen">

<button onclick="addFood()">Hinzufügen</button>

</div>

<div id="recipes" class="page">

<h1>Rezepte</h1>

<div id="recipeList"></div>

</div>

<div id="plan" class="page">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Montag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Dienstag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Mittwoch</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Donnerstag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Freitag</div>

</div>

</div>

<div id="shop" class="page">

<h1>Einkaufsliste</h1>

<input id="shopInput" placeholder="Produkt">

<button onclick="addShop()">Hinzufügen</button>

<div id="shopList"></div>

</div>

</div>

</div>

</div>

</div>

<script>

let ingredients=[]
let shopping=[]
let video=document.getElementById("video")

function register(){

localStorage.setItem("user",

JSON.stringify({

email:email.value,
pass:pass.value

})

)

alert("Registriert")

}

function login(){

let u=JSON.parse(localStorage.getItem("user"))

if(!u)return alert("Kein Account")

if(u.email==email.value && u.pass==pass.value){

loginScreen.style.display="none"
app.style.display="block"

}

}

function logout(){

location.reload()

}

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

}

function addFood(){

ingredients.push(newFood.value)

renderFoods()
generateRecipes()

}

function renderFoods(){

foods.innerHTML=""

ingredients.forEach(i=>{

let c=document.createElement("div")

c.className="card"

c.innerText=i

foods.appendChild(c)

})

}

function generateRecipes(){

recipeList.innerHTML=""

let recipes=[]

if(ingredients.includes("Ei"))recipes.push("Omelett")

if(ingredients.includes("Tomate"))recipes.push("Tomaten Pasta")

if(ingredients.includes("Käse"))recipes.push("Käse Sandwich")

if(recipes.length==0)recipes=["Salat","Pasta","Gemüsepfanne"]

recipes.forEach(r=>{

let f=document.createElement("div")

f.className="food"

f.innerText=r

f.draggable=true

f.ondragstart=drag

recipeList.appendChild(f)

})

}

function allowDrop(e){

e.preventDefault()

}

function drag(e){

e.dataTransfer.setData("text",e.target.innerText)

}

function drop(e){

e.preventDefault()

let d=e.dataTransfer.getData("text")

let f=document.createElement("div")

f.className="food"

f.innerText=d

e.target.appendChild(f)

}

function addShop(){

shopping.push(shopInput.value)

renderShop()

}

function renderShop(){

shopList.innerHTML=""

shopping.forEach((i,index)=>{

let el=document.createElement("div")

el.className="shopItem"

el.innerHTML=`${i} <button onclick="removeShop(${index})">X</button>`

shopList.appendChild(el)

})

}

function removeShop(i){

shopping.splice(i,1)

renderShop()

}

</script>

</body>
</html>
