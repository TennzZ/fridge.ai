<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FridgeAI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.loginScreen{
background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.loginCard{
background:rgba(0,0,0,0.85);
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.app{
display:none;
}

.layout{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:#1f2937;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#374151;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.content{
flex:1;
padding:20px;
}

.page{
display:none;
}

.active{
display:block;
}

.card{
background:#1f2937;
padding:10px;
margin:5px;
border-radius:6px;
display:inline-block;
}

.food{
background:#22c55e;
padding:6px;
margin:5px;
border-radius:6px;
cursor:grab;
}

.plan{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.day{
background:#1f2937;
padding:10px;
width:130px;
min-height:120px;
border-radius:10px;
}

.shopItem{
background:#1f2937;
padding:8px;
margin:5px;
border-radius:6px;
}

video{
width:320px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="loginScreen" class="loginScreen">

<div class="loginCard">

<h2>FridgeAI Login</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Passwort">

<button onclick="register()">Registrieren</button>
<button onclick="login()">Login</button>

</div>

</div>

<div id="app" class="app">

<div class="layout">

<div class="sidebar">

<h2>FridgeAI</h2>

<button onclick="showPage('scan')">📷 Scan</button>
<button onclick="showPage('recipes')">🍳 Rezepte</button>
<button onclick="showPage('plan')">📅 Wochenplan</button>
<button onclick="showPage('shop')">🛒 Einkauf</button>
<button onclick="logout()">Logout</button>

</div>

<div class="content">

<div id="scan" class="page active">

<h1>Kühlschrank Scan</h1>

<button onclick="startCamera()">Kamera starten</button>
<button onclick="switchCamera()">Kamera wechseln</button>
<button onclick="takePhoto()">Foto aufnehmen</button>
<button onclick="analyze()">Analysieren</button>

<br><br>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none"></canvas>

<h3>Zutaten</h3>
<div id="foods"></div>

<input id="manualFood" placeholder="Lebensmittel hinzufügen">
<button onclick="addFood()">Hinzufügen</button>

<h3>Kalorien Gesamt</h3>
<div id="calories"></div>

</div>

<div id="recipes" class="page">

<h1>Rezepte</h1>

<div id="recipeList"></div>

</div>

<div id="plan" class="page">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day">Montag</div>
<div class="day">Dienstag</div>
<div class="day">Mittwoch</div>
<div class="day">Donnerstag</div>
<div class="day">Freitag</div>
<div class="day">Samstag</div>
<div class="day">Sonntag</div>

</div>

</div>

<div id="shop" class="page">

<h1>Einkaufsliste</h1>

<input id="shopInput" placeholder="Produkt">
<button onclick="addShop()">Hinzufügen</button>

<div id="shopList"></div>

</div>

</div>

</div>

</div>

<script>

let ingredients=[]
let shopping=[]
let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let camera="environment"

const foodMap={
apple:{name:"Apfel",cal:95},
banana:{name:"Banane",cal:105},
orange:{name:"Orange",cal:62},
sandwich:{name:"Sandwich",cal:250},
bottle:{name:"Getränk",cal:120}
}

let model

async function loadModel(){
model=await cocoSsd.load()
}

loadModel()

function register(){

localStorage.setItem("user",
JSON.stringify({email:email.value,pass:pass.value})
)

alert("Registriert")

}

function login(){

let u=JSON.parse(localStorage.getItem("user"))

if(!u)return alert("Kein Account")

if(u.email==email.value && u.pass==pass.value){

loginScreen.style.display="none"
app.style.display="block"

}

}

function logout(){
location.reload()
}

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:camera}
})

video.srcObject=stream

}

function switchCamera(){

camera=camera==="environment"?"user":"environment"

startCamera()

}

function takePhoto(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

}

async function analyze(){

const predictions=await model.detect(canvas)

let total=0

predictions.forEach(p=>{

if(foodMap[p.class]){

ingredients.push(foodMap[p.class].name)
total+=foodMap[p.class].cal

}

})

renderFoods()

document.getElementById("calories").innerText=total+" kcal"

generateRecipes()

}

function addFood(){

ingredients.push(manualFood.value)

renderFoods()

}

function renderFoods(){

foods.innerHTML=""

ingredients.forEach(f=>{

let c=document.createElement("div")

c.className="card"
c.innerText=f

foods.appendChild(c)

})

}

function generateRecipes(){

recipeList.innerHTML=""

let recipes=[]

if(ingredients.includes("Apfel"))recipes.push("Fruchtsalat")

if(ingredients.includes("Banane"))recipes.push("Bananen Pancakes")

if(ingredients.includes("Sandwich"))recipes.push("Sandwich Toast")

if(recipes.length==0){
recipes=["Omelett","Pasta","Gemüsepfanne"]
}

recipes.forEach(r=>{

let el=document.createElement("div")

el.className="food"
el.innerText=r

recipeList.appendChild(el)

})

}

function addShop(){

shopping.push(shopInput.value)

renderShop()

}

function renderShop(){

shopList.innerHTML=""

shopping.forEach((i,index)=>{

let el=document.createElement("div")

el.className="shopItem"

el.innerHTML=`${i} <button onclick="removeShop(${index})">X</button>`

shopList.appendChild(el)

})

}

function removeShop(i){

shopping.splice(i,1)

renderShop()

}

</script>

</body>
</html>
