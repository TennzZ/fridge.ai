<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FridgeAI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
}

.pageBg{
min-height:100vh;
background-size:cover;
background-position:center;
padding:20px;
}

.scanBg{background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");}
.recipeBg{background-image:url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c");}
.planBg{background-image:url("https://images.unsplash.com/photo-1556910103-1c02745aae4d");}
.shopBg{background-image:url("https://images.unsplash.com/photo-1506617420156-8e4536971650");}

.overlay{
background:rgba(0,0,0,0.75);
padding:20px;
min-height:100vh;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111827;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#374151;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.content{
margin-left:220px;
}

.page{display:none}
.active{display:block}

.card{
background:#1f2937;
padding:10px;
margin:5px;
border-radius:6px;
display:inline-block;
}

.recipe{
background:#22c55e;
padding:8px;
margin:5px;
border-radius:6px;
cursor:grab;
}

.day{
background:#1f2937;
width:140px;
min-height:120px;
margin:5px;
padding:10px;
border-radius:10px;
}

.plan{
display:flex;
flex-wrap:wrap;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

video{
width:320px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>FridgeAI</h2>

<button onclick="showPage('scan')">📷 Kühlschrank Scan</button>
<button onclick="showPage('recipes')">🍳 Rezepte</button>
<button onclick="showPage('plan')">📅 Wochenplan</button>
<button onclick="showPage('shop')">🛒 Einkaufsliste</button>

</div>

<div class="content">

<div id="scan" class="page active pageBg scanBg">
<div class="overlay">

<h1>Kühlschrank Analyse</h1>

<button onclick="startCamera()">Kamera starten</button>
<button onclick="takePhoto()">Foto aufnehmen</button>
<button onclick="analyze()">Analysieren</button>

<br><br>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none"></canvas>

<h3>Zutaten</h3>
<div id="ingredientList"></div>

</div>
</div>

<div id="recipes" class="page pageBg recipeBg">
<div class="overlay">

<h1>Rezepte</h1>

<div id="premiumText"></div>

<button onclick="buyPremium()">Premium kaufen – 3.99 €</button>

<div id="recipeList"></div>

</div>
</div>

<div id="plan" class="page pageBg planBg">
<div class="overlay">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day">Montag</div>
<div class="day">Dienstag</div>
<div class="day">Mittwoch</div>
<div class="day">Donnerstag</div>
<div class="day">Freitag</div>
<div class="day">Samstag</div>
<div class="day">Sonntag</div>

</div>

</div>
</div>

<div id="shop" class="page pageBg shopBg">
<div class="overlay">

<h1>Einkaufsliste</h1>

<div id="shoppingList"></div>

</div>
</div>

</div>

<script>

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ingredients=[]
let premium=false

const foodMap={
apple:"Apfel",
banana:"Banane",
orange:"Orange",
sandwich:"Sandwich",
bottle:"Getränk"
}

let model

async function loadModel(){
model=await cocoSsd.load()
}

loadModel()

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({
video:true
})

video.srcObject=stream

}

function takePhoto(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

}

async function analyze(){

const predictions=await model.detect(canvas)

ingredients=[]

predictions.forEach(p=>{

if(foodMap[p.class]){
ingredients.push(foodMap[p.class])
}

})

renderIngredients()
generateRecipes()

}

function renderIngredients(){

ingredientList.innerHTML=""

ingredients.forEach(i=>{
let el=document.createElement("div")
el.className="card"
el.innerText=i
ingredientList.appendChild(el)
})

}

function buyPremium(){

premium=true
generateRecipes()

}

function generateRecipes(){

recipeList.innerHTML=""

if(!premium){

premiumText.innerHTML="🔒 Rezepte nur mit Premium (3.99€)"

return
}

premiumText.innerHTML=""

let recipes=[]

if(ingredients.includes("Apfel"))recipes.push("Fruchtsalat")
if(ingredients.includes("Banane"))recipes.push("Bananen Pancakes")
if(ingredients.includes("Sandwich"))recipes.push("Sandwich Toast")

if(recipes.length==0){
recipes=["Omelett","Pasta","Gemüsepfanne"]
}

recipes.forEach(r=>{

let el=document.createElement("div")
el.className="recipe"
el.innerText=r

recipeList.appendChild(el)

})

}

</script>

</body>
</html>
