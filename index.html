<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FridgeAI</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
}

.pageBg{
min-height:100vh;
background-size:cover;
background-position:center;
padding:20px;
}

.loginBg{background-image:url("https://images.unsplash.com/photo-1490818387583-1baba5e638af");}
.scanBg{background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");}
.recipeBg{background-image:url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c");}
.planBg{background-image:url("https://images.unsplash.com/photo-1556910103-1c02745aae4d");}
.shopBg{background-image:url("https://images.unsplash.com/photo-1506617420156-8e4536971650");}

.overlay{
background:rgba(0,0,0,0.75);
padding:20px;
min-height:100vh;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111827;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#374151;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.content{
margin-left:220px;
}

.page{display:none}
.active{display:block}

.card{
background:#1f2937;
padding:10px;
margin:5px;
border-radius:6px;
display:inline-block;
}

.recipe{
background:#22c55e;
padding:8px;
margin:5px;
border-radius:6px;
}

.day{
background:#1f2937;
width:140px;
min-height:120px;
margin:5px;
padding:10px;
border-radius:10px;
}

.plan{
display:flex;
flex-wrap:wrap;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="pageBg loginBg">

<div class="overlay">

<h1>FridgeAI Login</h1>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Passwort">

<button onclick="register()">Registrieren</button>
<button onclick="login()">Login</button>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none">

<div class="sidebar">

<h2>FridgeAI</h2>

<button onclick="showPage('scan')">📷 Analyse</button>
<button onclick="showPage('recipes')">🍳 Rezepte</button>
<button onclick="showPage('plan')">📅 Wochenplan</button>
<button onclick="showPage('shop')">🛒 Einkaufsliste</button>

</div>

<div class="content">

<!-- SCAN -->

<div id="scan" class="page active pageBg scanBg">
<div class="overlay">

<h1>Kühlschrank Analyse</h1>

<button onclick="analyze()">Analysieren</button>

<h3>Zutaten</h3>

<div id="ingredientList"></div>

</div>
</div>

<!-- RECIPES -->

<div id="recipes" class="page pageBg recipeBg">
<div class="overlay">

<h1>Rezepte</h1>

<button onclick="buyPremium()">Premium kaufen – 3.99 €</button>

<div id="recipeList"></div>

</div>
</div>

<!-- PLAN -->

<div id="plan" class="page pageBg planBg">
<div class="overlay">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day">Montag</div>
<div class="day">Dienstag</div>
<div class="day">Mittwoch</div>
<div class="day">Donnerstag</div>
<div class="day">Freitag</div>
<div class="day">Samstag</div>
<div class="day">Sonntag</div>

</div>

</div>
</div>

<!-- SHOP -->

<div id="shop" class="page pageBg shopBg">
<div class="overlay">

<h1>Einkaufsliste</h1>

<div id="shoppingList"></div>

</div>
</div>

</div>

</div>

<script>

let premium=false
let ingredients=[]

let foods=[
"Apfel","Banane","Orange","Zitrone","Limette","Birne","Pfirsich","Mango","Ananas","Erdbeere",
"Tomate","Gurke","Paprika","Zwiebel","Knoblauch","Karotte","Brokkoli","Blumenkohl","Spinat","Salat",
"Kartoffel","Süßkartoffel","Reis","Pasta","Spaghetti","Nudeln","Quinoa","Haferflocken","Mehl","Zucker",
"Milch","Joghurt","Butter","Käse","Ei","Sahne","Frischkäse","Mozzarella","Parmesan","Feta",
"Hähnchen","Rindfleisch","Schwein","Lachs","Thunfisch","Shrimps","Tofu","Tempeh","Bohnen","Linsen",
"Kichererbsen","Mais","Erbsen","Pilze","Avocado","Oliven","Mandeln","Walnüsse","Haselnüsse","Cashews",
"Rosinen","Honig","Ahornsirup","Ketchup","Mayonnaise","Senf","Sojasauce","Chilisauce","Curry","Paprikapulver",
"Oregano","Basilikum","Thymian","Rosmarin","Zimt","Muskat","Koriander","Kreuzkümmel","Vanille","Schokolade",
"Kakao","Kokosmilch","Kokosraspel","Bananchips","Popcorn","Chips","Cracker","Brot","Toast","Brötchen",
"Bagel","Wrap","Tortilla","Pizza","Burger","Hotdog","Lasagne","Ravioli","Tiramisu","Kuchen"
]

function register(){

localStorage.setItem("user",
JSON.stringify({email:email.value,password:password.value})
)

alert("Registriert")

}

function login(){

let user=JSON.parse(localStorage.getItem("user"))

if(user && user.email===email.value && user.password===password.value){

loginPage.style.display="none"
app.style.display="block"

}

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function analyze(){

ingredients=[]

for(let i=0;i<5;i++){

ingredients.push(foods[Math.floor(Math.random()*foods.length)])

}

renderIngredients()
generateRecipes()

}

function renderIngredients(){

ingredientList.innerHTML=""

ingredients.forEach(i=>{

let el=document.createElement("div")
el.className="card"
el.innerText=i

ingredientList.appendChild(el)

})

}

function buyPremium(){

premium=true
generateRecipes()

}

function generateRecipes(){

recipeList.innerHTML=""

if(!premium){

recipeList.innerHTML="🔒 Premium erforderlich für Rezepte"

return

}

ingredients.forEach(i=>{

let r=document.createElement("div")

r.className="recipe"
r.innerText="Gericht mit "+i

recipeList.appendChild(r)

})

}

</script>

</body>

</html>
