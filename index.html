<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FridgeAI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{

width:220px;
background:#1f2937;
padding:20px;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{

display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#374151;
border:none;
color:white;
border-radius:8px;
cursor:pointer;

}

.content{

flex:1;
padding:20px;

}

.page{

display:none;

}

.active{

display:block;

}

.card{

background:#1f2937;
padding:12px;
margin:6px;
border-radius:8px;
display:inline-block;

}

.food{

background:#22c55e;
padding:6px;
margin:5px;
border-radius:6px;
cursor:grab;

}

.plan{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.day{

background:#1f2937;
padding:10px;
width:150px;
min-height:120px;
border-radius:10px;

}

input{

padding:10px;
margin:5px;
border-radius:6px;
border:none;

}

button.action{

background:#22c55e;

}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>FridgeAI</h2>

<button onclick="showPage('dashboard')">🏠 Dashboard</button>

<button onclick="showPage('scan')">📷 Scan</button>

<button onclick="showPage('recipes')">🍳 Rezepte</button>

<button onclick="showPage('plan')">📅 Wochenplan</button>

<button onclick="showPage('shop')">🛒 Einkauf</button>

</div>

<div class="content">

<div id="dashboard" class="page active">

<h1>Willkommen bei FridgeAI</h1>

<p>Scanne deinen Kühlschrank und plane dein Essen.</p>

</div>

<div id="scan" class="page">

<h1>Kühlschrank Scan</h1>

<button onclick="startCamera()" class="action">Kamera starten</button>

<video id="video" width="300" autoplay></video>

<h3>Zutaten</h3>

<div id="foods"></div>

<input id="newFood" placeholder="Lebensmittel hinzufügen">

<button onclick="addFood()" class="action">Hinzufügen</button>

</div>

<div id="recipes" class="page">

<h1>Rezepte</h1>

<div id="recipeList"></div>

</div>

<div id="plan" class="page">

<h1>Wochenplan</h1>

<div class="plan">

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Montag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Dienstag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Mittwoch</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Donnerstag</div>

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Freitag</div>

</div>

</div>

<div id="shop" class="page">

<h1>Einkaufsliste</h1>

<input id="shopInput" placeholder="Produkt">

<button onclick="addShop()" class="action">Hinzufügen</button>

<div id="shopList"></div>

</div>

</div>

</div>

<script>

let ingredients=[]
let shopping=[]

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

}

function addFood(){

let f=newFood.value

ingredients.push(f)

renderFoods()

generateRecipes()

}

function renderFoods(){

foods.innerHTML=""

ingredients.forEach(i=>{

let c=document.createElement("div")

c.className="card"

c.innerText=i

foods.appendChild(c)

})

}

function generateRecipes(){

recipeList.innerHTML=""

let recipes=[]

if(ingredients.includes("Ei"))recipes.push("Omelett")

if(ingredients.includes("Tomate"))recipes.push("Tomaten Pasta")

if(ingredients.includes("Käse"))recipes.push("Käse Sandwich")

if(recipes.length==0)recipes=["Salat","Pasta","Gemüsepfanne"]

recipes.forEach(r=>{

let f=document.createElement("div")

f.className="food"

f.innerText=r

f.draggable=true

f.ondragstart=drag

recipeList.appendChild(f)

})

}

function allowDrop(e){

e.preventDefault()

}

function drag(e){

e.dataTransfer.setData("text",e.target.innerText)

}

function drop(e){

e.preventDefault()

let d=e.dataTransfer.getData("text")

let f=document.createElement("div")

f.className="food"

f.innerText=d

e.target.appendChild(f)

}

function addShop(){

shopping.push(shopInput.value)

renderShop()

}

function renderShop(){

shopList.innerHTML=""

shopping.forEach((i,index)=>{

let el=document.createElement("div")

el.className="card"

el.innerHTML=`${i} <button onclick="removeShop(${index})">X</button>`

shopList.appendChild(el)

})

}

function removeShop(i){

shopping.splice(i,1)

renderShop()

}

</script>

</body>

</html>
