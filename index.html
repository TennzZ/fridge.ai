<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FridgeAI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1542838132-92c53300491e");
background-size:cover;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:#111827;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.app{
display:none;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111827;
padding:20px;
}

.sidebar div{
margin:15px 0;
cursor:pointer;
}

.content{
margin-left:220px;
padding:40px;
text-align:center;
}

video{
width:450px;
border-radius:10px;
}

.card{
background:#1f2937;
padding:8px 12px;
margin:5px;
border-radius:6px;
display:inline-block;
}

.plan{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.day{
background:#1f2937;
padding:15px;
width:150px;
min-height:120px;
border-radius:10px;
}

.food{
background:#22c55e;
margin:5px;
padding:5px;
border-radius:6px;
cursor:grab;
}

.shopItem{
background:#1f2937;
margin:5px;
padding:8px;
border-radius:6px;
}

.done{
text-decoration:line-through;
opacity:0.6;
}

</style>

</head>

<body>

<div class="overlay">

<div id="loginScreen" class="center">

<div class="login">

<h2>FridgeAI</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Passwort">

<button onclick="register()">Registrieren</button>
<button onclick="login()">Login</button>

</div>

</div>

<div id="app" class="app">

<div class="sidebar">

<h3>FridgeAI</h3>

<div onclick="show('scan')">📷 Scan</div>
<div onclick="show('plan')">📅 Essensplan</div>
<div onclick="show('shop')">🛒 Einkauf</div>
<div onclick="logout()">Logout</div>

</div>

<div class="content">

<h1>Kühlschrank Scanner</h1>

<button onclick="startCamera()">Kamera starten</button>
<button onclick="scan()">Analysieren</button>

<br><br>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none"></canvas>

<h2>Zutaten</h2>
<div id="foods"></div>

<h3>Lebensmittel hinzufügen</h3>

<input id="newFood" placeholder="z.B. Tomaten">

<button onclick="addFood()">Hinzufügen</button>

<h2>Rezepte</h2>

<input id="search" placeholder="Rezept suchen">

<button onclick="searchRecipe()">Suchen</button>

<div id="recipes"></div>

<h2>Essensplan</h2>

<div class="plan">

<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Montag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Dienstag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Mittwoch</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Donnerstag</div>
<div class="day" ondrop="drop(event)" ondragover="allowDrop(event)">Freitag</div>

</div>

<h2>Einkaufsliste</h2>

<input id="shopInput" placeholder="z.B. Milch">

<button onclick="addShop()">Hinzufügen</button>

<div id="shopList"></div>

</div>

</div>

</div>

<script>

let video=document.getElementById("video")
let model

let ingredients=[]
let shopping=[]

async function loadModel(){

model=await cocoSsd.load()

}

loadModel()

function register(){

localStorage.setItem("user",

JSON.stringify({

email:email.value,
pass:pass.value

})

)

alert("Registriert")

}

function login(){

let u=JSON.parse(localStorage.getItem("user"))

if(!u)return alert("Kein Account")

if(u.email==email.value && u.pass==pass.value){

loginScreen.style.display="none"
app.style.display="block"

}else{

alert("Falsche Daten")

}

}

function logout(){

location.reload()

}

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

}

async function scan(){

const canvas=document.getElementById("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const preds=await model.detect(canvas)

preds.forEach(p=>{

ingredients.push(p.class)

})

renderFoods()
generateRecipes()

}

function addFood(){

ingredients.push(newFood.value)

renderFoods()
generateRecipes()

}

function renderFoods(){

foods.innerHTML=""

ingredients.forEach(f=>{

let card=document.createElement("div")

card.className="card"
card.innerText=f

foods.appendChild(card)

})

}

function generateRecipes(){

recipes.innerHTML=""

let meals=["Pasta","Salat","Sandwich","Omelett"]

meals.forEach(m=>{

let food=document.createElement("div")

food.className="food"
food.draggable=true
food.innerText=m
food.ondragstart=drag

recipes.appendChild(food)

})

}

function searchRecipe(){

let q=search.value.toLowerCase()

recipes.innerHTML=""

let all=["Pasta","Salat","Sandwich","Omelett","Pizza"]

all.filter(r=>r.toLowerCase().includes(q))

.forEach(r=>{

let f=document.createElement("div")

f.className="food"
f.draggable=true
f.innerText=r
f.ondragstart=drag

recipes.appendChild(f)

})

}

function allowDrop(ev){

ev.preventDefault()

}

function drag(ev){

ev.dataTransfer.setData("text",ev.target.innerText)

}

function drop(ev){

ev.preventDefault()

let data=ev.dataTransfer.getData("text")

let food=document.createElement("div")

food.className="food"
food.innerText=data

ev.target.appendChild(food)

}

function addShop(){

shopping.push(shopInput.value)

renderShop()

}

function renderShop(){

shopList.innerHTML=""

shopping.forEach((item,i)=>{

let el=document.createElement("div")

el.className="shopItem"

el.innerHTML=`
<input type="checkbox" onchange="toggle(${i})">
${item}
<button onclick="removeShop(${i})">X</button>
`

shopList.appendChild(el)

})

}

function toggle(i){

document.getElementsByClassName("shopItem")[i].classList.toggle("done")

}

function removeShop(i){

shopping.splice(i,1)

renderShop()

}

</script>

</body>
</html>
