<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FridgeAI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background-image:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");
background-size:cover;
background-position:center;
color:white;
min-height:100vh;

}

.overlay{

background:rgba(0,0,0,0.7);
min-height:100vh;
display:flex;

}

.sidebar{

width:230px;
background:#111827;
padding:30px;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar div{

margin:15px 0;
opacity:0.8;
cursor:pointer;
transition:0.3s;

}

.sidebar div:hover{

opacity:1;

}

.main{

flex:1;
padding:40px;
text-align:center;

}

button{

padding:14px 24px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:15px;
margin:10px;
cursor:pointer;
transition:0.3s;

}

button:hover{

transform:scale(1.05);

}

video{

width:500px;
border-radius:15px;
margin-top:20px;

}

.cards{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;

}

.card{

background:rgba(255,255,255,0.15);
padding:10px 15px;
border-radius:10px;

}

.login{

position:absolute;
top:20px;
right:30px;

}

input{

padding:8px;
margin:4px;
border-radius:5px;
border:none;

}

.section{

margin-top:35px;

}

.plan-card{

background:#1f2937;
padding:10px 15px;
border-radius:8px;
margin:5px;

}

</style>

</head>

<body>

<div class="overlay">

<div class="sidebar">

<h2>FridgeAI</h2>

<div>🏠 Dashboard</div>
<div>📷 Kühlschrank Scan</div>
<div>📅 Essensplan</div>
<div>🛒 Einkaufsliste</div>
<div>⚙️ Einstellungen</div>

</div>

<div class="main">

<div class="login">

<input placeholder="Email">
<input type="password" placeholder="Passwort">
<button>Login</button>

</div>

<h1>🥗 FridgeAI Kühlschrank Scanner</h1>

<button onclick="startCamera()">📷 Kamera starten</button>
<button onclick="analyze()">🤖 Kühlschrank analysieren</button>

<br>

<video id="video" autoplay></video>
<canvas id="canvas" style="display:none"></canvas>

<div class="section">

<h2>🥕 Erkannte Zutaten</h2>
<div id="ingredients" class="cards"></div>

</div>

<div class="section">

<h2>🍳 Rezepte</h2>
<div id="recipes" class="cards"></div>

</div>

<div class="section">

<h2>🛒 Fehlende Zutaten</h2>
<div id="shopping" class="cards"></div>

</div>

<div class="section">

<h2>📅 Essensplan</h2>
<div id="plan"></div>

</div>

<div id="days"></div>

</div>

</div>

<script>

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")

let model

async function loadModel(){

model=await cocoSsd.load()

}

loadModel()

async function startCamera(){

try{

const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream

}catch{

alert("Bitte Kamera erlauben")

}

}

async function analyze(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const predictions=await model.detect(canvas)

let detected=[]

predictions.forEach(p=>{

detected.push(p.class)

})

displayIngredients(detected)
generateRecipes(detected)
generateShopping(detected)
generatePlan()

document.getElementById("days").innerText=
"📅 Essen reicht ungefähr "+Math.max(1,Math.floor(detected.length/2))+" Tage"

}

function displayIngredients(list){

const div=document.getElementById("ingredients")
div.innerHTML=""

list.forEach(i=>{

const card=document.createElement("div")
card.className="card"
card.innerText=i

div.appendChild(card)

})

}

function generateRecipes(list){

let meals=[]

if(list.includes("banana")) meals.push("Bananen Pancakes")
if(list.includes("apple")) meals.push("Apfel Dessert")
if(list.includes("sandwich")) meals.push("Sandwich")
if(list.includes("bottle")) meals.push("Milch Rezept")

if(meals.length==0){

meals=["Omelett","Pasta","Sandwich"]

}

const div=document.getElementById("recipes")
div.innerHTML=""

meals.forEach(m=>{

const card=document.createElement("div")
card.className="card"
card.innerText="🍳 "+m

div.appendChild(card)

})

}

function generateShopping(list){

let needed=["Spaghetti","Parmesan","Tomaten"]

const div=document.getElementById("shopping")
div.innerHTML=""

needed.forEach(n=>{

const card=document.createElement("div")
card.className="card"
card.innerText=n

div.appendChild(card)

})

}

function generatePlan(){

const days=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag"]

const meals=["Omelett","Pasta","Sandwich","Salat","Pfannkuchen"]

const div=document.getElementById("plan")
div.innerHTML=""

for(let i=0;i<days.length;i++){

const card=document.createElement("div")
card.className="plan-card"
card.innerText=days[i]+" : "+meals[i]

div.appendChild(card)

}

}

</script>

</body>
</html>
